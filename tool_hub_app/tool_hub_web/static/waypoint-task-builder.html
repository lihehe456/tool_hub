<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waypoint Task Builder</title>
    <link rel="stylesheet" href="/hub-static/hub.css">
    <style>
      .builder-shell {
        display: grid;
        gap: 1rem;
      }
      .builder-toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        align-items: end;
      }
      .builder-toolbar label {
        flex: 1 1 220px;
        display: grid;
        gap: 0.35rem;
      }
      .builder-toolbar input,
      .builder-form input,
      .builder-inline-field input,
      #xml-preview {
        width: 100%;
        padding: 0.6rem 0.7rem;
        border-radius: 10px;
        border: 1px solid #314456;
        background: #121b24;
        color: #d6deeb;
        font: inherit;
      }
      .builder-layout {
        display: grid;
        grid-template-columns: minmax(260px, 300px) minmax(520px, 1.25fr) minmax(420px, 0.95fr);
        gap: 1rem;
        align-items: start;
      }
      .builder-panel {
        border: 1px solid #22303c;
        border-radius: 16px;
        background: rgba(15, 21, 29, 0.94);
        padding: 1rem;
        min-height: 0;
      }
      .builder-panel h2 {
        margin-top: 0;
      }
      .builder-panel-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem;
      }
      .builder-palette {
        display: grid;
        gap: 0.6rem;
      }
      .builder-palette-item {
        text-align: left;
        display: grid;
        gap: 0.25rem;
        padding: 0.7rem;
        border-radius: 12px;
        border: 1px solid #314456;
        background: #121b24;
        color: #d6deeb;
      }
      .builder-palette-item small {
        color: #8ca4b8;
      }
      .builder-tree-list {
        list-style: none;
        padding-left: 1.1rem;
        display: grid;
        gap: 0.6rem;
        position: relative;
      }
      .builder-tree-item {
        display: grid;
        gap: 0.45rem;
        position: relative;
      }
      .builder-tree-item::before {
        content: "";
        position: absolute;
        left: -0.7rem;
        top: 0;
        bottom: -0.6rem;
        width: 1px;
        background: rgba(77, 176, 232, 0.18);
      }
      .builder-tree-card {
        display: grid;
        gap: 0.8rem;
        padding: 0.7rem;
        border-radius: 14px;
        border: 1px solid #22303c;
        background: linear-gradient(180deg, #15212c 0%, #111820 100%);
      }
      .builder-tree-item[data-selected="true"] .builder-tree-card {
        border-color: #4db0e8;
        box-shadow: 0 0 0 1px rgba(77, 176, 232, 0.25);
      }
      .builder-tree-card-head {
        display: flex;
        justify-content: space-between;
        gap: 0.75rem;
        align-items: start;
      }
      .builder-tree-card-main {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        align-items: center;
        min-width: 0;
      }
      .builder-node-select {
        padding: 0;
        border: 0;
        background: transparent;
        color: #d6deeb;
        text-align: left;
        font-size: 1rem;
        font-weight: 700;
      }
      .builder-kind-badge {
        display: inline-flex;
        align-items: center;
        padding: 0.15rem 0.55rem;
        border-radius: 999px;
        background: rgba(77, 176, 232, 0.14);
        color: #8fd0f4;
        font-size: 0.78rem;
      }
      .builder-tree-card-body {
        display: grid;
        gap: 0.7rem;
      }
      .builder-tree-actions {
        display: flex;
        gap: 0.35rem;
        flex-wrap: wrap;
      }
      .builder-port-section {
        display: grid;
        gap: 0.35rem;
      }
      .builder-port-title {
        color: #8ca4b8;
        font-size: 0.8rem;
      }
      .builder-port-list {
        display: flex;
        flex-wrap: wrap;
        gap: 0.35rem;
      }
      .builder-port-badge {
        display: inline-flex;
        align-items: center;
        padding: 0.18rem 0.5rem;
        border-radius: 999px;
        font-size: 0.76rem;
        border: 1px solid transparent;
      }
      .builder-port-badge.is-input {
        color: #7fd2af;
        background: rgba(48, 116, 87, 0.24);
        border-color: rgba(92, 183, 145, 0.24);
      }
      .builder-port-badge.is-output {
        color: #f1c77b;
        background: rgba(141, 96, 24, 0.22);
        border-color: rgba(241, 199, 123, 0.2);
      }
      .builder-inline-fields {
        display: grid;
        gap: 0.55rem;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      }
      .builder-inline-field {
        display: grid;
        gap: 0.3rem;
      }
      .builder-inline-field span {
        color: #8ca4b8;
        font-size: 0.78rem;
      }
      .builder-dropzone {
        padding: 0.55rem 0.7rem;
        border: 1px dashed #3d5367;
        border-radius: 10px;
        color: #8ca4b8;
        font-size: 0.84rem;
        background: rgba(15, 21, 29, 0.75);
      }
      .builder-root-dropzone {
        min-height: 180px;
        display: grid;
        place-items: center;
        gap: 0.45rem;
        padding: 1.2rem;
        border: 1px dashed #4db0e8;
        border-radius: 16px;
        background:
          radial-gradient(circle at top, rgba(77, 176, 232, 0.14), transparent 58%),
          rgba(15, 21, 29, 0.78);
        color: #d6deeb;
        text-align: center;
      }
      .builder-root-dropzone span {
        color: #8ca4b8;
      }
      .builder-form {
        display: grid;
        gap: 0.75rem;
      }
      .builder-form label {
        display: grid;
        gap: 0.35rem;
      }
      #xml-preview {
        min-height: 520px;
        resize: vertical;
        font-family: "JetBrains Mono", "Fira Code", monospace;
        line-height: 1.45;
      }
      .picker-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(5, 8, 12, 0.72);
        align-items: center;
        justify-content: center;
      }
      .picker-overlay.visible {
        display: flex;
      }
      .picker-box {
        width: min(760px, 92vw);
        max-height: 72vh;
        display: grid;
        grid-template-rows: auto 1fr;
        border: 1px solid #22303c;
        border-radius: 14px;
        background: #0f151d;
        overflow: hidden;
      }
      .picker-header {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: 0.9rem 1rem;
        border-bottom: 1px solid #22303c;
      }
      .picker-list {
        overflow: auto;
        padding: 0.85rem;
        display: grid;
        gap: 0.45rem;
      }
      .picker-entry {
        padding: 0.65rem 0.8rem;
        border-radius: 10px;
        border: 1px solid #22303c;
        background: #121b24;
      }
      .picker-entry.dir,
      .picker-entry.json {
        cursor: pointer;
      }
      @media (max-width: 1500px) {
        .builder-layout {
          grid-template-columns: minmax(240px, 280px) minmax(460px, 1fr) minmax(380px, 0.9fr);
        }
      }
      @media (max-width: 1180px) {
        .builder-layout {
          grid-template-columns: 1fr;
        }
        #xml-preview {
          min-height: 420px;
        }
      }
    </style>
  </head>
  <body>
    <div id="picker-overlay" class="picker-overlay">
      <div class="picker-box">
        <div class="picker-header">
          <strong id="picker-title">选择文件</strong>
          <span id="picker-cwd"></span>
          <button type="button" data-action="close-picker">关闭</button>
        </div>
        <div id="picker-list" class="picker-list"></div>
      </div>
    </div>
    <main class="hub-page builder-shell">
      <header class="hub-hero">
        <p class="hub-kicker">Waypoint Tasks</p>
        <h1>Waypoint Task Builder</h1>
        <p class="hub-subtitle">面向现有 waypoint task XML 模板的专用树编辑器。</p>
      </header>

      <section class="builder-toolbar builder-panel">
        <label>
          <span>任务文件</span>
          <input id="task-path" type="text" placeholder="/abs/path/to/task.xml">
        </label>
        <button id="browse-task-button" type="button">浏览文件</button>
        <button id="load-task-button" type="button">加载</button>
        <button id="new-task-button" type="button">新建</button>
      </section>

      <section class="builder-toolbar builder-panel">
        <label>
          <span>保存目录</span>
          <input id="task-directory" type="text" placeholder="/abs/path/to/waypoint_tasks">
        </label>
        <label>
          <span>任务名称</span>
          <input id="task-name" type="text" placeholder="demo_task">
        </label>
        <button id="browse-directory-button" type="button">浏览目录</button>
        <button id="save-task-button" type="button">保存 XML</button>
        <button id="clear-tree-button" type="button">清空树</button>
      </section>

      <p id="builder-status" class="hub-flow" data-error="false">准备就绪</p>

      <section class="builder-layout">
        <article class="builder-panel">
          <h2>节点库</h2>
          <div id="builder-palette"></div>
        </article>
        <article class="builder-panel">
          <h2>树结构</h2>
          <div id="builder-tree"></div>
        </article>
        <article class="builder-panel">
          <h2>节点参数</h2>
          <div id="builder-fields"></div>
          <div class="builder-panel-header">
            <h2>XML 预览 / 反向导入</h2>
            <button id="parse-xml-button" type="button">从 XML 还原</button>
          </div>
          <textarea id="xml-preview"></textarea>
        </article>
      </section>
    </main>
    <script type="module" src="/hub-static/waypoint-task-builder.js"></script>
  </body>
</html>
