<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Path Editor Web</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <div class="app-shell">
    <header id="topbar" class="topbar">
      <div class="title-block">
        <h1>Path Editor Web</h1>
        <div id="current-path" class="muted">未打开路径</div>
      </div>
      <div class="toolbar-group">
        <a class="task-group-link" href="/">返回导航页</a>
        <button id="toggle-topbar-button" type="button" class="collapse-button" aria-expanded="true" title="折叠顶部栏">收起</button>
        <label>
          绘制模式
          <select id="draw-mode">
            <option value="line">直线</option>
            <option value="bezier">Bezier</option>
          </select>
        </label>
        <button id="new-button" type="button">新建</button>
        <button id="open-map-button" type="button">加载地图</button>
        <button id="save-button" type="button">保存</button>
        <button id="save-as-button" type="button">另存为</button>
      </div>
    </header>

    <main class="main-layout">
      <aside class="sidebar left">
        <div class="panel-title">路径管理</div>
        <div id="file-tree" class="panel-body"></div>
      </aside>

      <section class="canvas-panel">
        <div class="panel-title">
          <span>地图画布</span>
          <span id="map-info" class="muted">未加载地图</span>
        </div>
        <div class="tool-row">
          <button type="button" data-tool="select">选择</button>
          <button type="button" data-tool="add">加点</button>
          <button type="button" data-tool="insert">插点</button>
          <button type="button" data-tool="move">移点</button>
          <button type="button" data-tool="rotate">调朝向</button>
          <button type="button" data-tool="delete">删点</button>
          <div class="offset-controls" aria-label="路径整体偏移">
            <label>dx<input id="offset-x" type="number" step="0.01" value="0"></label>
            <label>dy<input id="offset-y" type="number" step="0.01" value="0"></label>
            <button id="offset-path-button" type="button">整体偏移</button>
          </div>
          <div id="point-info" class="point-info muted">点信息：未选择路点</div>
        </div>
        <div class="canvas-wrap">
          <canvas id="map-canvas"></canvas>
        </div>
      </section>

      <aside class="sidebar right">
        <section class="sidebar-section">
          <div class="panel-title">地图选择</div>
          <div id="map-tree" class="panel-body panel-body-compact"></div>
        </section>
        <section class="sidebar-section sidebar-section-fill">
          <div class="panel-title">路径属性</div>
          <form id="meta-form" class="meta-form">
            <label>path_name<input name="path_name" type="text"></label>
            <label>community<input name="community" type="text"></label>
            <label>building<input name="building" type="number" step="1"></label>
            <label>unit<input name="unit" type="number" step="1"></label>
            <label>floor<input name="floor" type="number" step="1"></label>
            <label>door<input name="door" type="number" step="1"></label>
            <label>point_interval<input name="point_interval" type="number" step="0.1" min="0"></label>
            <label>map_url<input name="map_url" type="text"></label>
            <label>pcd_url<input name="pcd_url" type="text"></label>
          </form>
        </section>
        <section class="sidebar-section">
          <div class="panel-title">Subtask Builder</div>
          <div class="subtask-builder">
            <label>工作区文件<input id="workspace-path" type="text" placeholder="/abs/path/to/task-group-workspace.json"></label>
            <div class="subtask-builder-actions">
              <button id="generate-subtasks-button" type="button">生成子任务对</button>
              <button id="create-workspace-button" type="button">生成工作区文件</button>
              <button id="add-subtasks-button" type="button">加入工作区</button>
              <button id="replace-subtasks-button" type="button">替换同源对子任务</button>
            </div>
            <a id="task-group-link" class="task-group-link" href="/task-groups">前往任务组工作区</a>
            <a class="task-group-link" href="/task-group-mixer">前往任务组混编页</a>
            <div id="subtask-builder-status" class="subtask-builder-status" data-error="false">等待生成子任务对</div>
            <div id="subtask-preview" class="subtask-preview"></div>
          </div>
        </section>
      </aside>
    </main>

    <footer id="status" class="status-bar">准备就绪</footer>
  </div>
  <script type="module" src="/static/app.js"></script>
</body>
</html>
